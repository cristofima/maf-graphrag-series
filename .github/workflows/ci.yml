name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"

# Cancel in-progress runs for the same branch/PR (best practice: save CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# -----------------------------------------------------------------------
# Stage layout (best practice: one concern per job, fast feedback via parallelism)
#
#   lint ──────────┐
#                  ├──► test
#   typecheck ─────┘
#
# lint and typecheck run in parallel after setup.
# test only runs when both quality gates pass.
# -----------------------------------------------------------------------

jobs:
  # ── Stage 1a: Code formatting & lint rules ──────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.3.2

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Format check (ruff format)
        run: poetry run python -m ruff format src/ tests/ --check

      - name: Lint — critical errors
        run: poetry run python -m ruff check . --select E9,F63,F7,F82 --output-format github

      - name: Lint — full rule set
        run: poetry run python -m ruff check . --output-format github

  # ── Stage 1b: Static type checking (runs in parallel with lint) ─────
  typecheck:
    name: "Type Check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.3.2

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Type check with mypy
        run: |
          poetry run python -m mypy src/core/ src/agents/ src/mcp_server/ src/workflows/ \
            --ignore-missing-imports \
            --no-error-summary

  # ── Stage 2: Tests (only after quality gates pass) ──────────────────
  test:
    name: "Test"
    needs: [lint, typecheck]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.3.2

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run tests
        run: poetry run pytest
