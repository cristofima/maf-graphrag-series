name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.3.2

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --with dev --no-interaction

      - name: Lint with Ruff (errors only)
        run: |
          # Fail on syntax errors, undefined names, and critical issues
          poetry run python -m ruff check . --select E9,F63,F7,F82 --output-format github

      - name: Lint with Ruff (full)
        run: |
          # Report all issues as warnings without failing the build
          poetry run python -m ruff check . --output-format github --exit-zero

      - name: Type check with mypy
        run: |
          poetry run python -m mypy src/core/ src/agents/ src/mcp_server/ src/workflows/ \
            --ignore-missing-imports \
            --no-error-summary

      - name: Test with pytest
        run: poetry run pytest
